# ── Prefix ───────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── General ──────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -g mouse off
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 10000
set -g escape-time 0
set -g focus-events on

# ── Reload config ────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# ── Split panes (vim-style) ───────────────────────────────
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ── Navigate panes (vim-style) ───────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Resize panes ─────────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Windows ──────────────────────────────────────────────
bind c new-window -c "#{pane_current_path}"
bind n next-window
bind p previous-window

# ── Copy mode (vi keys) ───────────────────────────────────
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel

# ── Status bar ───────────────────────────────────────────
set -g status-position top
set -g status-style "bg=#282828,fg=#ebdbb2"
set -g status-left "#[bg=#458588,fg=#282828,bold] #S #[bg=#282828,fg=#458588]"
set -g status-left-length 20
set -g status-right "#[fg=#928374]%H:%M #[fg=#ebdbb2]%d %b"
set -g status-right-length 40
set -g window-status-format " #I:#W "
set -g window-status-current-format "#[bg=#98971a,fg=#282828,bold] #I:#W "
set -g window-status-style "fg=#928374"
set -g pane-border-style "fg=#3c3836"
set -g pane-active-border-style "fg=#458588"
set -g message-style "bg=#fabd2f,fg=#282828"
